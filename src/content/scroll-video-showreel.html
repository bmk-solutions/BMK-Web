      <video id="reelVid" muted loop playsinline preload="metadata" poster="assets/hero.webp">
        <source src="/assets/reel.mp4" type="video/mp4">

      <img class="reel-fallback" src="/assets/hero.webp" alt="" aria-hidden="true" style="display:none">

        <p data-en="Every frame we capture becomes a measured, dated data point in your project's timeline.">كل لقطة نلتقطها تتحوّل إلى نقطة بيانات مؤرّخة ومقيسة في الخط الزمني لمشروعك.</p>
      </div>
    </div>
  </div>
</section>

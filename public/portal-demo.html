/* =======================================================================
   CHARTS
   ======================================================================= */
function chartFont(){ return { family:'Alexandria' }; }
function buildCharts(){
  Object.values(charts).forEach(c=>c&&c.destroy());
  const grid = THEME==='dark' ? 'rgba(255,255,255,.06)' : 'rgba(17,17,17,.06)';
  const tick = THEME==='dark' ? '#9ca3af' : '#6b7280';
  const gold = '#C4A661';
  Chart.defaults.font.family = 'Alexandria';
  Chart.defaults.color = tick;

  // Trend (area)
  const tc = document.getElementById('trendChart');
  const g = tc.getContext('2d').createLinearGradient(0,0,0,260);
  g.addColorStop(0,'rgba(196,166,97,.35)'); g.addColorStop(1,'rgba(196,166,97,0)');
  const months = LANG==='ar' ? ['يناير','فبراير','مارس','أبريل','مايو','يونيو'] : ['Jan','Feb','Mar','Apr','May','Jun'];
  charts.trend = new Chart(tc,{ type:'line',
    data:{ labels:months, datasets:[
      { label:LANG==='ar'?'المبيعات':'Sales', data:[1.1,1.4,1.3,1.7,2.1,2.6], borderColor:gold, backgroundColor:g, fill:true, tension:.4, borderWidth:3, pointBackgroundColor:gold, pointRadius:0, pointHoverRadius:6 },
      { label:LANG==='ar'?'الهدف':'Target', data:[1.2,1.3,1.5,1.6,1.9,2.2], borderColor:'#8E7CC3', borderDash:[6,6], borderWidth:2, fill:false, tension:.4, pointRadius:0 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{ position:'bottom', labels:{ usePointStyle:true, boxWidth:8, padding:18 } } },
      scales:{ x:{ grid:{ display:false }, ticks:{font:chartFont()} }, y:{ grid:{ color:grid }, ticks:{ callback:v=>v+'B', font:chartFont() } } } }
  });

  // Funnel (horizontal bar)
  const stages = ['new','contacted','viewing','negotiation','won'];
  charts.funnel = new Chart(document.getElementById('funnelChart'),{ type:'bar',
    data:{ labels:stages.map(s=>t().stages[s]), datasets:[{ data:[420,260,150,90,46],
      backgroundColor:['#5B8DEF','#8E7CC3','#C4A661','#A8884A','#22c55e'], borderRadius:8, barThickness:18 }]},
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
      scales:{ x:{ grid:{color:grid}, ticks:{font:chartFont()} }, y:{ grid:{display:false}, ticks:{font:chartFont()} } } }
  });

  // Revenue doughnut
  charts.rev = new Chart(document.getElementById('revChart'),{ type:'doughnut',
    data:{ labels:DEVELOPERS.map(d=>d.name[LANG]), datasets:[{ data:DEVELOPERS.map(d=>d.revenue),
      backgroundColor:['#C4A661','#8E7CC3','#5B8DEF'], borderWidth:0, hoverOffset:10 }]},
    options:{ responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{ legend:{ position:'bottom', labels:{ usePointStyle:true, boxWidth:8, padding:14, font:chartFont() } } } }
  });
}

/* =======================================================================
   MAP
   ======================================================================= */
function buildMap(elId){
  if(mapInstance){ mapInstance.remove(); mapInstance=null; }
  const el = document.getElementById(elId); if(!el) return;
  const map = L.map(el,{ scrollWheelZoom:false, attributionControl:false }).setView([30.02,31.45],9);
  const tiles = THEME==='dark'
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  L.tileLayer(tiles,{ maxZoom:19 }).addTo(map);
  PROJECTS.forEach(p=>{
    const d = devById(p.dev);
    const html = `<div style="position:relative"><div style="width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:linear-gradient(135deg,${d.primary},#A8884A);box-shadow:0 6px 18px rgba(0,0,0,.35);border:2px solid #fff"></div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;font-family:Space Grotesk">${p.sold}</div></div>`;
    const ic = L.divIcon({ html, className:'', iconSize:[30,30], iconAnchor:[15,28] });
    L.marker([p.lat,p.lng],{icon:ic}).addTo(map)
     .bindPopup(`<div style="font-family:Alexandria;min-width:160px"><b style="color:${d.primary}">${p.name[LANG]}</b><br><span style="font-size:12px;color:#888">${p.loc[LANG]}</span><br><span style="font-size:12px">${t().common.sold}: <b>${p.sold}%</b></span></div>`);
  });
  mapInstance = map;
  setTimeout(()=>map.invalidateSize(),250);
}

function ring(pct,color,size=58){
  const r=24, c=2*Math.PI*r, off=c-(pct/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 56 56" class="ring-prog shrink-0">
    <circle cx="28" cy="28" r="${r}" fill="none" stroke="currentColor" class="text-black/5 dark:text-white/10" stroke-width="5"/>
    <circle cx="28" cy="28" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

        <div class="text-gold text-xs font-semibold uppercase tracking-[.3em] mb-4">${L18.about}</div>
        <h2 class="font-serif text-3xl md:text-4xl font-black mb-6 leading-tight">${LANG==='ar'?'نصنع المساحات التي تروي قصص النجاح':'We craft spaces that tell stories of success'}</h2>
        <p class="text-neutral-300 leading-relaxed mb-6">${d.about[LANG]}</p>
        <div class="glass rounded-2xl p-5 border-s-2 border-gold" style="background:rgba(196,166,97,.08)">
          <div class="text-gold text-xs font-semibold uppercase tracking-wider mb-2">${L18.vision}</div>
          <p class="text-sm text-neutral-200 italic">"${d.vision[LANG]}"</p>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        ${projects.slice(0,1).map(p=>`<img src="${p.bg}" class="rounded-3xl h-64 w-full object-cover col-span-2" alt=""/>`).join('')}
        <img src="${d.hero}" class="rounded-3xl h-44 w-full object-cover" alt=""/>
        <div class="rounded-3xl h-44 flex flex-col items-center justify-center text-center p-4" style="background:linear-gradient(135deg,${d.primary},#A8884A)">
          <div class="font-serif text-4xl font-black">${d.revenue}B</div><div class="text-xs opacity-90 mt-1">${LANG==='ar'?'محفظة بالجنيه':'Portfolio (EGP)'}</div>
        </div>
      </div>
    </section>

    <!-- Before / After -->
    <section class="max-w-6xl mx-auto px-6 pb-24">
      <div class="text-center mb-10">
        <div class="text-gold text-xs font-semibold uppercase tracking-[.3em] mb-3">${L18.baTitle}</div>
        <h2 class="font-serif text-3xl md:text-4xl font-black">${LANG==='ar'?'من الرؤية إلى الواقع':'From vision to reality'}</h2>
      </div>
      <div id="baWrap" class="relative max-w-3xl mx-auto h-[420px] rounded-3xl overflow-hidden select-none ring-1 ring-white/10">
        <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=1600&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover" alt="before"/>
        <div id="baTop" class="absolute inset-0 overflow-hidden" style="width:50%">
          <img src="${projects[0]?projects[0].bg:d.hero}" class="absolute inset-0 h-full object-cover" style="width:48rem;max-width:none" alt="after"/>
        </div>
        <div id="baLine" class="absolute top-0 bottom-0 w-1 bg-gold" style="left:50%"></div>
        <input id="baRange" type="range" min="0" max="100" value="50" class="ba-range absolute inset-0 w-full h-full opacity-0 cursor-ew-resize"/>
        <span class="absolute top-4 left-4 text-xs font-bold px-3 py-1.5 rounded-lg bg-black/50 backdrop-blur">${LANG==='ar'?'قبل':'Before'}</span>
        <span class="absolute top-4 right-4 text-xs font-bold px-3 py-1.5 rounded-lg text-white" style="background:${d.primary}cc">${LANG==='ar'?'بعد':'After'}</span>
      </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="max-w-6xl mx-auto px-6 pb-24">
      <div class="text-center mb-12">
        <div class="text-gold text-xs font-semibold uppercase tracking-[.3em] mb-3">${L18.projects}</div>
        <h2 class="font-serif text-3xl md:text-4xl font-black">${LANG==='ar'?'مشاريع تستحق الانتماء إليها':'Projects worth belonging to'}</h2>
      </div>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        ${projects.map(p=>`<div class="lift group rounded-3xl overflow-hidden relative h-80 cursor-pointer">
          <img src="${p.bg}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition duration-700" alt="${p.name[LANG]}"/>
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
          <div class="absolute bottom-0 inset-x-0 p-6">
            <div class="text-xs text-gold mb-1 flex items-center gap-1">${icon('pin','w-3 h-3')}${p.loc[LANG]}</div>
            <h3 class="font-serif text-2xl font-bold mb-2">${p.name[LANG]}</h3>
            <div class="flex items-center justify-between">
              <span class="text-sm text-neutral-300">${LANG==='ar'?'يبدأ من':'From'} <b class="text-white font-mono">${p.price}M</b></span>
              <span class="flex items-center gap-1 text-xs font-semibold text-gold opacity-0 group-hover:opacity-100 transition">${L18.contact}${icon('chevron','w-3.5 h-3.5'+(LANG==='ar'?' rotate-180':''))}</span>
            </div>
          </div>
        </div>`).join('')}
      </div>
    </section>

    <!-- CTA / Contact -->
    <section id="contact" class="max-w-6xl mx-auto px-6 pb-24">
      <div class="relative rounded-[2rem] overflow-hidden p-10 md:p-16 text-center" style="background:linear-gradient(135deg,${d.primary}22,rgba(196,166,97,.12))">
        <div class="absolute -top-20 -right-20 w-72 h-72 rounded-full blur-3xl opacity-30" style="background:${d.primary}"></div>
        <div class="relative">
          <h2 class="font-serif text-3xl md:text-5xl font-black mb-4">${L18.cta}</h2>
          <p class="text-neutral-300 mb-8 max-w-xl mx-auto">${LANG==='ar'?'سيتواصل معك مستشار عقاري خلال ٢٤ ساعة لترتيب جولة خاصة.':'A property consultant will contact you within 24 hours to arrange a private tour.'}</p>
          <form id="ctaForm" class="flex flex-col sm:flex-row gap-3 max-w-lg mx-auto">
            <input required placeholder="${LANG==='ar'?'رقم هاتفك':'Your phone number'}" class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-sm placeholder:text-neutral-400 focus:ring-2 focus:ring-gold/50"/>
            <button class="bg-gradient-to-l from-gold to-gold-deep text-white font-semibold px-7 py-4 rounded-2xl shadow-gold hover:brightness-110 transition cursor-pointer whitespace-nowrap">${L18.cta}</button>
          </form>
          <div id="ctaDone" class="hidden mt-5 text-emerald-400 font-semibold">${L18.booked}</div>
          <div class="flex items-center justify-center gap-4 mt-8">
            ${['whatsapp','instagram','facebook','phone','mail'].map(s=>`<a href="#" class="w-11 h-11 rounded-full glass flex items-center justify-center hover:text-gold hover:border-gold/40 transition cursor-pointer" style="background:rgba(255,255,255,.06)">${icon(s,'w-4 h-4')}</a>`).join('')}
          </div>
        </div>
      </div>
    </section>

    <footer class="border-t border-white/5 py-8 text-center text-xs text-neutral-500">
      <div class="font-serif font-bold text-white mb-1">${d.name[LANG]}</div>
      © 2026 — ${LANG==='ar'?'مدعوم بواسطة':'Powered by'} <span class="text-gold">BMK Solutions</span>
    </footer>
  </div>`;

  document.getElementById('backBtn').onclick = closeLanding;
  // before/after slider
  const range=document.getElementById('baRange'), top=document.getElementById('baTop'), line=document.getElementById('baLine');
  range.oninput = ()=>{ top.style.width=range.value+'%'; line.style.left=range.value+'%'; };
  // cta
  document.getElementById('ctaForm').onsubmit = e=>{ e.preventDefault(); document.getElementById('ctaDone').classList.remove('hidden'); e.target.querySelector('input').value=''; };
  window.scrollTo(0,0);
}
function closeLanding(){
  document.getElementById('landingRoot').classList.add('hidden');
  document.getElementById('landingRoot').innerHTML='';
  document.getElementById('app').classList.remove('hidden');
}

/* =======================================================================
   ROUTER + TOGGLES
   ======================================================================= */
const ROUTES = { dashboard:renderDashboard, developers:renderDevelopers, projects:renderProjects, visits:renderVisits, leads:renderLeads, landing:renderLandingList, settings:renderSettings };
function go(page){ PAGE=page; renderShell(); (ROUTES[page]||renderDashboard)(); document.getElementById('page').scrollTop=0; }

function toggleTheme(){
  THEME = THEME==='dark'?'light':'dark';
  document.documentElement.classList.toggle('dark', THEME==='dark');
  go(PAGE);
}
function toggleLang(){
  LANG = LANG==='ar'?'en':'ar';
  document.documentElement.lang = LANG;
  document.documentElement.dir = t().dir;
  go(PAGE);
}

/* ---------- Boot ---------- */
document.documentElement.classList.add('dark');
go('dashboard');
</script>
</body>
</html>
